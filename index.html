<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCHA Incident Dashboard</title>

<!-- ROBOTO -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- PAPAPARSE -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --primary:#009EDB;
  --dark:#004987;
  --bg:#f4f7fa;
  --text:#222;
}

body{
  margin:0;
  font-family:"Roboto",sans-serif;
  background:var(--bg);
}

/* HEADER */
.header{
  background:var(--primary);
  color:white;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
}

.header img{
  height:38px;
}

.header button{
  background:white;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:1150px;
  margin:auto;
  padding:20px;
}

.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.section{
  background:white;
  padding:15px;
}

/* KPI */
.kpis{
  display:flex;
  gap:10px;
}

.kpi strong{
  font-size:18px;
}

/* MAP */
#map{
  height:300px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;}
td,th{font-size:12px;padding:6px;border-bottom:1px solid #ddd;}

#loading{text-align:center;}
#empty{display:none;text-align:center;}

@media(max-width:768px){
  .dashboard{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="OCHA Logo_beside_blue.png">
  <div>
    <button onclick="downloadData()">Download Dataset</button>
    <div style="font-size:12px">For Internal Use Only</div>
  </div>
</div>

<div class="container">

<h2>Global IO Worker Incident Dashboard</h2>

<div id="loading">Loading data...</div>
<div id="empty">No data available</div>

<div class="dashboard">

<!-- KPI -->
<div class="section">
<h3>Top Country KPIs</h3>
<div class="kpis">
<div class="kpi"><strong id="country"></strong><br>Country</div>
<div class="kpi"><strong id="incidents"></strong><br>Incidents</div>
<div class="kpi"><strong id="killed"></strong><br>Killed</div>
<div class="kpi"><strong id="affected"></strong><br>Affected</div>
</div>
</div>

<!-- MAP -->
<div class="section">
<h3>Risk Map</h3>
<div id="map"></div>
</div>

<!-- BAR -->
<div class="section">
<h3>Casualties by Country</h3>
<canvas id="barChart"></canvas>
</div>

<!-- PIE -->
<div class="section">
<h3>Motives</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<!-- TABLE -->
<div class="section">
<h3>Data Table</h3>
<table>
<thead>
<tr><th>Country</th><th>Motive</th><th>Affected</th></tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
let rawData=[];
let map;

/* LOAD CSV */
fetch("global-security-incidents.csv")
.then(res=>res.text())
.then(text=>{

Papa.parse(text,{
  header:true,
  skipEmptyLines:true,
  complete:function(results){

    console.log("RAW:",results.data);

    rawData=results.data.map(d=>({
      country:d.Country,
      lat:parseFloat(d.Latitude),
      lon:parseFloat(d.Longitude),
      motive:d["Motive"],
      affected:+d["Total affected"]||0,
      killed:+d["Total killed"]||0
    }));

    console.log("CLEANED:",rawData);

    init();
  }
});

});

/* INIT DASHBOARD */
function init(){

document.getElementById("loading").style.display="none";

if(!rawData.length){
  document.getElementById("empty").style.display="block";
  return;
}

/* KPI */
let grouped={};
rawData.forEach(d=>{
  grouped[d.country]=(grouped[d.country]||0)+d.affected;
});

let top=Object.entries(grouped).sort((a,b)=>b[1]-a[1])[0];

document.getElementById("country").innerText=top[0];
document.getElementById("affected").innerText=top[1];
document.getElementById("incidents").innerText=rawData.length;
document.getElementById("killed").innerText=
rawData.reduce((a,b)=>a+b.killed,0);

/* MAP */
map=L.map("map").setView([10,0],2);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

rawData.forEach(d=>{
if(d.lat && d.lon){
L.circle([d.lat,d.lon],{
radius:20000,
color:"#c0392b"
}).addTo(map);
}
});

/* BAR */
let barData={};
rawData.forEach(d=>{
  barData[d.country]=(barData[d.country]||0)+d.killed;
});

new Chart(document.getElementById("barChart"),{
type:"bar",
data:{
labels:Object.keys(barData).slice(0,10),
datasets:[{
data:Object.values(barData).slice(0,10),
backgroundColor:"#004987"
}]
}
});

/* PIE */
let pieData={};
rawData.forEach(d=>{
  pieData[d.motive]=(pieData[d.motive]||0)+1;
});

new Chart(document.getElementById("pieChart"),{
type:"pie",
data:{
labels:Object.keys(pieData).slice(0,5),
datasets:[{
data:Object.values(pieData).slice(0,5)
}]
}
});

/* TABLE */
let table=document.getElementById("tableBody");

rawData.slice(0,25).forEach(d=>{
table.innerHTML+=`<tr>
<td>${d.country}</td>
<td>${d.motive}</td>
<td>${d.affected}</td>
</tr>`;
});

}

/* DOWNLOAD */
function downloadData(){
window.open("global-security-incidents.csv");
}
</script>

</body>
</html>
